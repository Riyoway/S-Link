name: "Vercel Production - Card Notify"

on: deployment_status

env:
  LOOKBACK: 20
  SUCCESS_ICON: "https://cdn.discordapp.com/emojis/1441732215259136141.webp?size=32&animated=true"
  FAILURE_ICON: "https://cdn.discordapp.com/emojis/1441732212771917824.webp?size=32&animated=true"
  CHART_HOST: "https://quickchart.io/chart"

jobs:
  notify:
    # Environmentが 'Production' かつ、状態が 'success' または 'failure' の時のみ実行
    if: github.event.deployment.environment == 'Production' && (github.event.deployment_status.state == 'success' || github.event.deployment_status.state == 'failure')
    runs-on: ubuntu-latest

    permissions:
      deployments: read
      contents: read
      statuses: read

    steps:
      - name: Install dependencies (jq, python3)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq python3

      - name: Build stats and chart
        id: stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          
          LOOKBACK="${LOOKBACK}"
          REPO="${REPO}"

          echo "Fetching deployments for repo: $REPO (Lookback: $LOOKBACK)"

          # APIリクエスト (Deploymentsの取得)
          deps_json=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${REPO}/deployments?environment=Production&per_page=${LOOKBACK}")

          json_type=$(echo "$deps_json" | jq -r type)

          if [ "$json_type" != "array" ]; then
            echo "::error::GitHub API returned an error object instead of an array."
            echo "Response content: $deps_json"
            exit 1
          fi

          total=$(echo "$deps_json" | jq 'length')
          echo "Found $total deployments."

          successes=0
          failures=0
          durations=()
          labels=()
          values=()
          colors=()

          if [ "$total" -gt 0 ]; then
            for i in $(seq 0 $(($total - 1))); do
              dep_id=$(echo "$deps_json" | jq -r ".[$i].id")
              dep_sha=$(echo "$deps_json" | jq -r ".[$i].sha // .[$i].ref")
              dep_created=$(echo "$deps_json" | jq -r ".[$i].created_at")

              # 各デプロイの最新ステータス取得
              st_json=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${REPO}/deployments/${dep_id}/statuses?per_page=1")

              st_state=$(echo "$st_json" | jq -r '.[0].state // "unknown"')
              st_updated=$(echo "$st_json" | jq -r '.[0].updated_at // empty')

              short_sha=$(echo "$dep_sha" | cut -c1-7)
              labels+=("$short_sha")

              if [ "$st_state" = "success" ]; then
                successes=$((successes+1))
                values+=("1")
                colors+=("#2ecc71")
              else
                failures=$((failures+1))
                values+=("0")
                colors+=("#e74c3c")
              fi

              # ビルド時間の計算 (秒)
              if [ -n "$st_updated" ] && [ "$st_updated" != "null" ]; then
                created_s=$(date -d "$dep_created" +%s || echo 0)
                updated_s=$(date -d "$st_updated" +%s || echo 0)
                durations+=($((updated_s - created_s)))
              else
                durations+=(0)
              fi
            done
          fi

          # 統計情報の計算
          if [ "$total" -gt 0 ]; then
            sum=0
            for d in "${durations[@]}"; do sum=$((sum + d)); done
            avg=$((sum / total))
            rate=$(awk "BEGIN { printf \"%.1f\", (${successes}/${total}) * 100 }")
          else
            avg=0
            rate="0.0"
          fi
          
          labels_json=$(printf '%s\n' "${labels[@]}" | jq -R . | jq -s .)
          values_json=$(printf '%s\n' "${values[@]}" | jq -R . | jq -s .)
          colors_json=$(printf '%s\n' "${colors[@]}" | jq -R . | jq -s .)

          # QuickChart設定の生成 (callback内のクォートを修正済)
          chart_cfg=$(jq -n \
            --argjson labels "$labels_json" \
            --argjson data "$values_json" \
            --argjson colors "$colors_json" \
            '{
              type: "bar",
              data: { labels: $labels, datasets: [{ data: $data, backgroundColor: $colors }] },
              options: { 
                legend: { display: false }, 
                scales: { 
                  yAxes: [{ 
                    ticks: { min: 0, max: 1, stepSize: 1, callback: "function(value){return value==1?\"Success\":\"Failure\"}" },
                    scaleLabel: { display: true, labelString: "Status" }
                  }],
                  xAxes: [{ scaleLabel: { display: true, labelString: "Commit SHA" } }]
                }
              }
            }'
          )
 
          # PythonでURLエンコード
          chart_cfg_enc=$(python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read()))" <<<"$chart_cfg")

          # 結果をGitHub Actionsの出力にセット
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "success=$successes" >> $GITHUB_OUTPUT
          echo "failure=$failures" >> $GITHUB_OUTPUT
          echo "avg=$avg" >> $GITHUB_OUTPUT
          echo "rate=$rate" >> $GITHUB_OUTPUT
          echo "chart=${CHART_HOST}?c=${chart_cfg_enc}" >> $GITHUB_OUTPUT
          echo "Chart URL length: ${#CHART_HOST}?c=${chart_cfg_enc}"

      - name: Send Discord notification (fixed)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
          DEPLOY_COMMIT: ${{ github.event.deployment.sha }}
          DEPLOY_BY: ${{ github.event.deployment.creator.login }}
          DEPLOY_TIME: ${{ github.event.deployment_status.updated_at }}
          REPO: ${{ github.repository }}
          TOTAL: ${{ steps.stats.outputs.total }}
          SUCCESS: ${{ steps.stats.outputs.success }}
          FAILURE: ${{ steps.stats.outputs.failure }}
          AVG: ${{ steps.stats.outputs.avg }}
          RATE: ${{ steps.stats.outputs.rate }}
          CHART: ${{ steps.stats.outputs.chart }}
        run: |
          set -euo pipefail

          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is empty. Please set the secret."
            exit 1
          fi

          if [ "${{ github.event.deployment_status.state }}" = "success" ]; then
            COLOR=5763719
            ICON="${SUCCESS_ICON}"
            TITLE="✅ Production Deployed"
            STATUS="🟢 Success"
          else
            COLOR=15158332
            ICON="${FAILURE_ICON}"
            TITLE="❌ Deployment Failed"
            STATUS="🔴 Failed"
          fi

          # シェル側で安全に加工して jq に渡す
          DETAILS_URL="$DEPLOY_URL"
          SHORT_COMMIT="${DEPLOY_COMMIT:0:7}"
          CHART_URL="$CHART"

          payload=$(jq -n \
            --arg title "$TITLE" \
            --arg status "$STATUS" \
            --arg repo "$REPO" \
            --arg short_commit "$SHORT_COMMIT" \
            --arg by "$DEPLOY_BY" \
            --arg time "$DEPLOY_TIME" \
            --arg details_url "$DETAILS_URL" \
            --arg chart "$CHART_URL" \
            --arg icon "$ICON" \
            --argjson color "$COLOR" \
            --arg total "$TOTAL" \
            --arg success "$SUCCESS" \
            --arg failure "$FAILURE" \
            --arg avg "$AVG" \
            --arg rate "$RATE" \
            '{
              username: "Vercel Notify",
              avatar_url: $icon,
              embeds: [
                {
                  title: $title,
                  description: $status,
                  url: $details_url,
                  color: $color,
                  author: { name: $repo, icon_url: $icon },
                  fields: [
                    { name: "Commit", value: ("`" + $short_commit + "`"), inline: true },
                    { name: "By", value: $by, inline: true },
                    { name: "Success Rate", value: ($rate + "% (" + $success + "/" + $total + ")"), inline: true },
                    { name: "Avg Build (s)", value: $avg, inline: true },
                    { name: "Details", value: ("[Open](" + $details_url + ")"), inline: false }
                  ],
                  image: { url: $chart },
                  thumbnail: { url: $icon },
                  timestamp: $time
                }
              ]
            }')

          echo "--- Discord Payload ---"
          echo "$payload"
          echo "-----------------------"

          http_response=$(curl -o response.txt -w "%{http_code}" -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK" || true)

          echo "HTTP Status Code: $http_response"
          echo "Response Body:"
          cat response.txt || true

          if [ "$http_response" -ne 204 ] && [ "$http_response" -ne 200 ]; then
            echo "::error::Discord returned a non-success HTTP code ($http_response). See Response Body above for details."
            exit 1
          fi
