name: Notify Discord on Vercel Production Deploy

on:
  deployment_status:

jobs:
  notify:
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest

    steps:
      - name: Send embed to Discord
        run: |
          STATE="${{ github.event.deployment_status.state }}"
          ENV="${{ github.event.deployment.environment }}"
          URL="${{ github.event.deployment_status.target_url }}"
          REPO="${{ github.repository }}"
          COMMIT="${{ github.event.deployment.sha }}"
          TIME="${{ github.event.deployment_status.updated_at }}"
          TRIGGER="${{ github.event.sender.login }}"

          # success=green / others=red
          if [ "$STATE" = "success" ]; then
            COLOR=3066993
          else
            COLOR=15158332
          fi

          payload=$(jq -n \
            --arg state "$STATE" \
            --arg env "$ENV" \
            --arg url "$URL" \
            --arg repo "$REPO" \
            --arg commit "$COMMIT" \
            --arg trigger "$TRIGGER" \
            --arg time "$TIME" \
            --argjson color "$COLOR" \
            '{
              "embeds": [
                {
                  "title": "Vercel Production Deploy Completed",
                  "description": "**New production deployment finished.**",
                  "color": $color,
                  "fields": [
                    { "name": "Status", "value": $state, "inline": true },
                    { "name": "Repository", "value": $repo, "inline": true },
                    { "name": "Commit", "value": $commit, "inline": false },
                    { "name": "Triggered By", "value": $trigger, "inline": true },
                    { "name": "Environment", "value": $env, "inline": true },
                    { "name": "Preview URL", "value": $url, "inline": false }
                  ],
                  "timestamp": $time
                }
              ]
            }')

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "$payload" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
