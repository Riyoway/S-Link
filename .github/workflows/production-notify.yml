name: "Vercel Production - Card Notify (No Chart)"

on: deployment_status

env:
  # アイコンURLを直接変数として定義 (Discord通知ステップで使用)
  SUCCESS_ICON: "https://cdn.discordapp.com/emojis/1441732215259136141.webp?size=32&animated=true"
  FAILURE_ICON: "https://cdn.discordapp.com/emojis/1441732212771917824.webp?size=32&animated=true"

jobs:
  notify:
    # Environmentが 'Production' かつ、状態が 'success' または 'failure' の時のみ実行
    if: github.event.deployment.environment == 'Production' && (github.event.deployment_status.state == 'success' || github.event.deployment_status.state == 'failure')
    runs-on: ubuntu-latest

    permissions:
      deployments: read # 統計情報収集のために必要だったが、今回は不要。念のため残す。
      contents: read
      statuses: read

    steps:
      # 【変更】統計情報収集ステップを簡素化し、必須情報のみを抽出する
      - name: Extract Deployment Info
        id: info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          
          DEP_ID=${{ github.event.deployment.id }}
          
          # 現在のデプロイステータスから日時を取得
          DEPLOY_CREATED=${{ github.event.deployment.created_at }}
          DEPLOY_UPDATED=${{ github.event.deployment_status.updated_at }}
          
          # デプロイ時間を計算 (秒)
          created_s=$(date -d "$DEPLOY_CREATED" +%s || echo 0)
          updated_s=$(date -d "$DEPLOY_UPDATED" +%s || echo 0)
          duration=$((updated_s - created_s))
          
          # ステータス情報として、今回のデプロイ時間のみを保持
          echo "avg=$duration" >> $GITHUB_OUTPUT 
          # 成功率などは計算しないため、固定値を設定（または削除）
          echo "rate=N/A" >> $GITHUB_OUTPUT
          echo "total=1" >> $GITHUB_OUTPUT
          echo "success=N/A" >> $GITHUB_OUTPUT
          echo "failure=N/A" >> $GITHUB_OUTPUT


      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
          DEPLOY_COMMIT: ${{ github.event.deployment.sha }}
          DEPLOY_BY: ${{ github.event.deployment.creator.login }}
          DEPLOY_TIME: ${{ github.event.deployment_status.updated_at }}
          REPO: ${{ github.repository }}
          # 【変更】チャート関連の変数は削除し、今回の情報のみを使用
          AVG: ${{ steps.info.outputs.avg }}
          TOTAL: ${{ steps.info.outputs.total }}
          RATE: ${{ steps.info.outputs.rate }}
          
        run: |
          set -euo pipefail
          
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is empty. Please set the secret."
            exit 1
          fi

          if [ "${{ github.event.deployment_status.state }}" = "success" ]; then
            COLOR=5763719
            ICON="${SUCCESS_ICON}"
            TITLE="✅ Production Deployed"
            STATUS="🟢 Success"
          else
            COLOR=15158332
            ICON="${FAILURE_ICON}"
            TITLE="❌ Deployment Failed"
            STATUS="🔴 Failed"
          fi

          DETAILS="[Details]($DEPLOY_URL)"

          payload=$(jq -n \
            --arg title "$TITLE" \
            --arg status "$STATUS" \
            --arg repo "$REPO" \
            --arg commit "$DEPLOY_COMMIT" \
            --arg by "$DEPLOY_BY" \
            --arg time "$DEPLOY_TIME" \
            --arg details "$DETAILS" \
            --arg icon "$ICON" \
            --argjson color "$COLOR" \
            --arg avg "$AVG" \
            --arg rate "$RATE" \
            --arg total "$TOTAL" \
            --arg deploy_url "$DEPLOY_URL" \
            '{
              username: "Vercel Notify",
              avatar_url: $icon,
              embeds: [
                {
                  title: $title,
                  description: $status,
                  # 【修正済】正しいURLをセット
                  url: $deploy_url, 
                  color: $color,
                  author: { name: $repo, icon_url: $icon },
                  fields: [
                    { name: "Commit", value: ("`" + ($commit | .[:7]) + "`"), inline: true },
                    { name: "By", value: $by, inline: true },
                    # 【変更】成功率を今回の情報のみに変更（または削除）
                    { name: "Duration (s)", value: $avg, inline: true }, 
                    { name: "Details", value: $details, inline: false }
                  ],
                  # 【削除】imageフィールドを完全に削除
                  thumbnail: { url: $icon },
                  timestamp: $time
                }
              ]
            }')
            
          echo "--- Discord Payload ---"
          echo "$payload"
          echo "-----------------------"
          
          echo "Sending request to Discord..."
          http_response=$(curl -o response.txt -w "%{http_code}" -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK")
          
          echo "HTTP Status Code: $http_response"
          echo "Response Body:"
          cat response.txt

          if [ "$http_response" -ne 204 ] && [ "$http_response" -ne 200 ]; then
            echo "::error::Discord returned a non-success HTTP code ($http_response). See Response Body above for details."
            exit 1
          fi