name: Notify Discord on Vercel Production Deploy

on:
  check_run:
    types: [completed]

jobs:
  notify:
    if: github.event.check_run.name == 'Vercel — Production'
    runs-on: ubuntu-latest

    steps:
      - name: Send notification to Discord
        run: |
          STATUS="${{ github.event.check_run.conclusion }}"
          START="${{ github.event.check_run.started_at }}"
          END="${{ github.event.check_run.completed_at }}"
          COMMIT="${{ github.event.check_run.head_sha }}"
          TRIGGER="${{ github.event.sender.login }}"
          CHECK_URL="${{ github.event.check_run.html_url }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.event.check_run.check_suite.head_branch }}"
          CHECK_NAME="${{ github.event.check_run.name }}"

          # Success / Failed assets
          if [ "$STATUS" = "success" ]; then
            COLOR=3066993
            ICON="https://i.imgur.com/2uXbW2L.png"  # Green check
            STATE_TEXT="Deployment Succeeded"
          else
            COLOR=15158332
            ICON="https://i.imgur.com/UMhZpYB.png"  # Red cross
            STATE_TEXT="Deployment Failed"
          fi

          json=$(jq -n \
            --arg status "$STATE_TEXT" \
            --arg start "$START" \
            --arg end "$END" \
            --arg commit "$COMMIT" \
            --arg trigger "$TRIGGER" \
            --arg url "$CHECK_URL" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg name "$CHECK_NAME" \
            --arg icon "$ICON" \
            --argjson color "$COLOR" \
            '{
              "username": "Vercel Notifier",
              "avatar_url": $icon,
              "embeds": [
                {
                  "title": $status,
                  "color": $color,
                  "author": {
                    "name": $name,
                    "icon_url": $icon
                  },
                  "fields": [
                    {
                      "name": "Repository",
                      "value": $repo,
                      "inline": true
                    },
                    {
                      "name": "Branch",
                      "value": $branch,
                      "inline": true
                    },
                    {
                      "name": "Commit",
                      "value": ("`" + $commit + "`"),
                      "inline": false
                    },
                    {
                      "name": "Triggered By",
                      "value": $trigger,
                      "inline": true
                    },
                    {
                      "name": "Details",
                      "value": ("[View Check](" + $url + ")"),
                      "inline": true
                    }
                  ],
                  "thumbnail": {
                    "url": $icon
                  },
                  "footer": {
                    "text": "Vercel Production Deployment"
                  },
                  "timestamp": $end
                }
              ]
            }')

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "$json" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
