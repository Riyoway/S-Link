<!-- public/offline.html -->
<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>オフライン</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap");

      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #f0f4f8;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
        padding: 1rem;
      }

      svg {
        width: 120px;
        height: 120px;
        margin-bottom: 1rem;
        animation: float 2s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }

      p {
        font-size: 1rem;
        color: #555;
      }

      .highlight {
        color: #0d6efd;
        font-weight: 600;
      }

      .button {
        margin-top: 2rem;
        padding: 0.75rem 1.5rem;
        background: #0d6efd;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        text-decoration: none;
        display: inline-block;
      }

      .button:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
      }
    </style>
  </head>
  <body>
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="30" stroke="#0d6efd" stroke-width="4" />
      <path
        stroke="#0d6efd"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M22 32h20M22 38h20M32 26v12"
      />
    </svg>

    <h1>オフラインです</h1>
    <p>
      オフラインでアプリを使用するには<br /><span class="highlight">認証</span
      >が必要です。
    </p>
    <p>インターネットに接続してサインインしてください。</p>

    <a href="/" class="button">ホームへ戻る</a>
  </body>
</html>
